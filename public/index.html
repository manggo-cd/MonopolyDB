<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monopoly — Setup</title>
    <link rel="stylesheet" href="/css/home.css" />
  </head>
  <body>
    <header class="site-header">
      <h1>Monopoly</h1>
      <p class="tagline">Pass-and-play, classic rules, no banker required.</p>
    </header>

    <main class="setup">
      <section class="card">
        <h2>New game</h2>

        <form id="setup-form" novalidate>
          <fieldset class="row">
            <legend>Players</legend>
            <div class="players-toolbar">
              <label for="player-count">Number of players</label>
              <select id="player-count" name="player-count">
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4" selected>4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
              </select>
            </div>
            <ol id="player-list" class="player-list"></ol>
          </fieldset>

          <fieldset class="row">
            <legend>Rules</legend>
            <label class="inline">
              <span>Starting cash</span>
              <input
                type="number"
                id="starting-cash"
                name="starting-cash"
                min="500"
                step="50"
                value="1500"
              />
            </label>
            <label class="inline checkbox">
              <input type="checkbox" id="free-parking-jackpot" name="free-parking-jackpot" />
              <span>Free Parking jackpot (taxes &amp; fees pool there)</span>
            </label>
          </fieldset>

          <div class="actions">
            <button type="submit" class="primary">Start game</button>
          </div>
        </form>
      </section>

      <section class="card" id="saved-games-card" hidden>
        <h2>Saved games</h2>
        <ul id="saved-games-list" class="saved-games"></ul>
      </section>
    </main>

    <script type="module" src="/js/ui/home.js"></script>
  </body>
</html>
